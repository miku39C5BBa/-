<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快递驿站AI智能摆件系统演示</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background-color: #f5f7fa;
            color: #333;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
            overflow: hidden;
        }
        
        /* 头部样式 */
        .header {
            background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
            color: white;
            padding: 30px 40px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .header h1 {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 18px;
            opacity: 0.9;
            max-width: 800px;
        }
        
        /* 主体内容 */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            min-height: 800px;
        }
        
        .panel {
            padding: 30px;
            border-right: 1px solid #eee;
        }
        
        .panel-right {
            background: #f9fafc;
        }
        
        .panel-title {
            font-size: 24px;
            font-weight: 700;
            color: #1a237e;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e3f2fd;
            display: flex;
            align-items: center;
        }
        
        .panel-title i {
            margin-right: 10px;
            color: #1a73e8;
        }
        
        /* 左侧包裹列表 */
        .package-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 10px;
        }
        
        .package-item {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.05);
            border-left: 5px solid #4285f4;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .package-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .package-item.overpack {
            border-left-color: #fbbc05;
        }
        
        .package-item.overpack .overpack-badge {
            display: inline-block;
            background: #fbbc05;
            color: #333;
            font-size: 12px;
            padding: 3px 8px;
            border-radius: 10px;
            margin-left: 10px;
        }
        
        .package-item.selected {
            border-left-color: #34a853;
            background-color: #f0f9f0;
        }
        
        .package-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        
        .package-id {
            font-weight: 700;
            font-size: 18px;
            color: #1a73e8;
        }
        
        .package-size {
            background: #e8f0fe;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 14px;
        }
        
        .package-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 14px;
            color: #666;
        }
        
        .package-detail-item span:first-child {
            font-weight: 600;
            margin-right: 5px;
        }
        
        .ai-recommendation {
            margin-top: 15px;
            padding: 10px;
            background: #f0f7ff;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .ai-recommendation span {
            font-weight: 600;
            color: #1a73e8;
        }
        
        /* 右侧货架区域 */
        .shelves-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .shelf {
            background: #fff;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.05);
        }
        
        .shelf-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .shelf-name {
            font-weight: 700;
            font-size: 18px;
            color: #1a237e;
        }
        
        .shelf-utilization {
            font-size: 14px;
            background: #e8f0fe;
            padding: 5px 10px;
            border-radius: 5px;
        }
        
        .shelf-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
        }
        
        .shelf-slot {
            height: 60px;
            background: #f5f7fa;
            border-radius: 5px;
            border: 2px dashed #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.3s ease;
        }
        
        .shelf-slot:hover {
            background: #e8f0fe;
        }
        
        .shelf-slot.filled {
            background: #e6f4ea;
            border: 2px solid #34a853;
        }
        
        .shelf-slot.overpack {
            background: #fef7e0;
            border: 2px solid #fbbc05;
        }
        
        .slot-label {
            position: absolute;
            top: 3px;
            left: 5px;
            font-size: 10px;
            color: #888;
        }
        
        .slot-content {
            text-align: center;
            font-size: 12px;
        }
        
        .slot-content .package-id {
            font-weight: 700;
            font-size: 14px;
        }
        
        /* 控制面板 */
        .control-panel {
            margin-top: 30px;
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.05);
        }
        
        .control-title {
            font-size: 20px;
            font-weight: 700;
            color: #1a237e;
            margin-bottom: 20px;
        }
        
        .control-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .btn i {
            margin-right: 8px;
        }
        
        .btn-primary {
            background: #1a73e8;
            color: white;
        }
        
        .btn-primary:hover {
            background: #0d62d9;
        }
        
        .btn-secondary {
            background: #f1f3f4;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e1e5e9;
        }
        
        .btn-success {
            background: #34a853;
            color: white;
        }
        
        .btn-success:hover {
            background: #2e8b47;
        }
        
        .btn-warning {
            background: #fbbc05;
            color: #333;
        }
        
        .btn-warning:hover {
            background: #e6a800;
        }
        
        .log-panel {
            margin-top: 30px;
            background: #f9fafc;
            border-radius: 10px;
            padding: 20px;
            max-height: 200px;
            overflow-y: auto;
        }
        
        .log-title {
            font-size: 18px;
            font-weight: 700;
            color: #1a237e;
            margin-bottom: 15px;
        }
        
        .log-item {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }
        
        .log-item:last-child {
            border-bottom: none;
        }
        
        .log-time {
            color: #666;
            font-size: 12px;
            margin-right: 10px;
        }
        
        /* 底部 */
        .footer {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 14px;
            border-top: 1px solid #eee;
            background: #f9fafc;
        }
        
        /* 响应式调整 */
        @media (max-width: 1200px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .panel {
                border-right: none;
                border-bottom: 1px solid #eee;
            }
        }
        
        @media (max-width: 768px) {
            .header {
                padding: 20px;
            }
            
            .header h1 {
                font-size: 28px;
            }
            
            .panel {
                padding: 20px;
            }
            
            .shelf-grid {
                grid-template-columns: repeat(4, 1fr);
            }
            
            .control-buttons {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1><i class="fas fa-robot"></i> 快递驿站AI智能摆件系统演示</h1>
            <p>模拟AI根据包裹信息自动规划最优摆放位置，支持人机协同调整与过度包装检测</p>
        </div>
        
        <!-- 主体内容 -->
        <div class="main-content">
            <!-- 左侧：包裹列表与AI规划 -->
            <div class="panel">
                <div class="panel-title">
                    <i class="fas fa-box-open"></i> 今日待处理包裹列表
                </div>
                
                <div class="package-list" id="packageList">
                    <!-- 包裹列表将通过JavaScript动态生成 -->
                </div>
                
                <div class="control-panel">
                    <div class="control-title">AI规划控制</div>
                    <div class="control-buttons">
                        <button class="btn btn-primary" id="btnAutoPlan">
                            <i class="fas fa-magic"></i> AI自动规划所有包裹
                        </button>
                        <button class="btn btn-secondary" id="btnManualPlan">
                            <i class="fas fa-user-edit"></i> 手动规划选中包裹
                        </button>
                        <button class="btn btn-warning" id="btnDetectOverpack">
                            <i class="fas fa-search"></i> 检测过度包装
                        </button>
                        <button class="btn btn-secondary" id="btnReset">
                            <i class="fas fa-redo"></i> 重置演示
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- 右侧：货架展示 -->
            <div class="panel panel-right">
                <div class="panel-title">
                    <i class="fas fa-th-large"></i> 货架状态与AI推荐摆放
                </div>
                
                <div class="shelves-container">
                    <!-- 货架A -->
                    <div class="shelf">
                        <div class="shelf-header">
                            <div class="shelf-name">A区货架 (下层 - 重货/大件)</div>
                            <div class="shelf-utilization">利用率: <span id="shelfAUsage">0%</span></div>
                        </div>
                        <div class="shelf-grid" id="shelfA">
                            <!-- 货架格子将通过JavaScript动态生成 -->
                        </div>
                    </div>
                    
                    <!-- 货架B -->
                    <div class="shelf">
                        <div class="shelf-header">
                            <div class="shelf-name">B区货架 (中层 - 标准小件)</div>
                            <div class="shelf-utilization">利用率: <span id="shelfBUsage">0%</span></div>
                        </div>
                        <div class="shelf-grid" id="shelfB">
                            <!-- 货架格子将通过JavaScript动态生成 -->
                        </div>
                    </div>
                    
                    <!-- 货架C -->
                    <div class="shelf">
                        <div class="shelf-header">
                            <div class="shelf-name">C区货架 (上层 - 轻货/大件)</div>
                            <div class="shelf-utilization">利用率: <span id="shelfCUsage">0%</span></div>
                        </div>
                        <div class="shelf-grid" id="shelfC">
                            <!-- 货架格子将通过JavaScript动态生成 -->
                        </div>
                    </div>
                </div>
                
                <div class="log-panel">
                    <div class="log-title">系统操作日志</div>
                    <div id="systemLog">
                        <div class="log-item">
                            <span class="log-time">14:30:00</span> 系统初始化完成，等待操作...
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 底部 -->
        <div class="footer">
            <p>快递驿站AI智能摆件系统演示 | 展示AI规划、人机协同与过度包装检测核心流程</p>
            <p>演示说明：点击包裹可选中，AI会根据包裹尺寸、重量和收件人信息自动推荐最优货架位置</p>
        </div>
    </div>

    <script>
        // 系统状态
        const systemState = {
            packages: [],
            shelves: {
                A: Array(6).fill(null), // 下层货架，6个位置
                B: Array(6).fill(null), // 中层货架，6个位置
                C: Array(6).fill(null)  // 上层货架，6个位置
            },
            selectedPackage: null,
            logs: []
        };

        // 模拟快递数据
        const mockPackages = [
            { id: "SF123456789", size: "大", weight: 3.5, recipient: "138****1234", content: "书籍", actualSize: "中", isOverpack: false },
            { id: "YT987654321", size: "中", weight: 1.2, recipient: "139****5678", content: "服装", actualSize: "小", isOverpack: true },
            { id: "ST456789123", size: "小", weight: 0.3, recipient: "138****1234", content: "耳机", actualSize: "小", isOverpack: false },
            { id: "YD321654987", size: "大", weight: 4.8, recipient: "137****9012", content: "小家电", actualSize: "中", isOverpack: false },
            { id: "ZT789123456", size: "中", weight: 2.1, recipient: "136****3456", content: "文具", actualSize: "小", isOverpack: true },
            { id: "JD654987321", size: "小", weight: 0.5, recipient: "135****7890", content: "化妆品", actualSize: "小", isOverpack: false },
            { id: "YD987321654", size: "大", weight: 5.2, recipient: "137****9012", content: "玩具", actualSize: "大", isOverpack: false },
            { id: "SF654321987", size: "中", weight: 1.8, recipient: "139****5678", content: "零食", actualSize: "中", isOverpack: false }
        ];

        // 初始化系统
        function initSystem() {
            systemState.packages = [...mockPackages];
            systemState.shelves = {
                A: Array(6).fill(null),
                B: Array(6).fill(null),
                C: Array(6).fill(null)
            };
            systemState.selectedPackage = null;
            
            // 清空日志，只保留初始消息
            systemState.logs = ["系统初始化完成，等待操作..."];
            
            renderPackages();
            renderShelves();
            updateShelfUsage();
            renderLogs();
            
            addLog("系统已重置，可以开始演示");
        }

        // 渲染包裹列表
        function renderPackages() {
            const packageList = document.getElementById('packageList');
            packageList.innerHTML = '';
            
            systemState.packages.forEach((pkg, index) => {
                const packageItem = document.createElement('div');
                packageItem.className = `package-item ${pkg.isOverpack ? 'overpack' : ''} ${systemState.selectedPackage === index ? 'selected' : ''}`;
                packageItem.dataset.index = index;
                
                packageItem.innerHTML = `
                    <div class="package-info">
                        <div class="package-id">${pkg.id}</div>
                        <div class="package-size">${pkg.size}件 (${pkg.weight}kg)</div>
                    </div>
                    <div class="package-details">
                        <div class="package-detail-item">
                            <span>收件人:</span>
                            <span>${pkg.recipient}</span>
                        </div>
                        <div class="package-detail-item">
                            <span>内容物:</span>
                            <span>${pkg.content}</span>
                        </div>
                    </div>
                    ${pkg.isOverpack ? '<div class="overpack-badge">过度包装</div>' : ''}
                    <div class="ai-recommendation">
                        AI推荐: <span id="recommendation-${index}">点击"AI自动规划"获取推荐位置</span>
                    </div>
                `;
                
                packageItem.addEventListener('click', () => {
                    // 更新选中状态
                    document.querySelectorAll('.package-item').forEach(item => {
                        item.classList.remove('selected');
                    });
                    packageItem.classList.add('selected');
                    systemState.selectedPackage = index;
                    
                    addLog(`选中包裹 ${pkg.id}，收件人: ${pkg.recipient}`);
                });
                
                packageList.appendChild(packageItem);
            });
        }

        // 渲染货架
        function renderShelves() {
            // 清空货架
            ['A', 'B', 'C'].forEach(shelfId => {
                const shelfElement = document.getElementById(`shelf${shelfId}`);
                shelfElement.innerHTML = '';
                
                systemState.shelves[shelfId].forEach((slot, index) => {
                    const slotElement = document.createElement('div');
                    const slotId = `${shelfId}${index + 1}`;
                    
                    if (slot) {
                        // 货架位置已被占用
                        const pkg = slot;
                        slotElement.className = `shelf-slot filled ${pkg.isOverpack ? 'overpack' : ''}`;
                        slotElement.innerHTML = `
                            <div class="slot-label">${slotId}</div>
                            <div class="slot-content">
                                <div class="package-id">${pkg.id}</div>
                                <div>${pkg.recipient}</div>
                            </div>
                        `;
                        
                        // 添加点击事件，用于人工调整
                        slotElement.addEventListener('click', () => {
                            if (systemState.selectedPackage !== null) {
                                manualPlacePackage(systemState.selectedPackage, shelfId, index);
                            }
                        });
                    } else {
                        // 空货架位置
                        slotElement.className = 'shelf-slot';
                        slotElement.innerHTML = `
                            <div class="slot-label">${slotId}</div>
                            <div class="slot-content">空位</div>
                        `;
                        
                        // 添加点击事件，用于人工调整
                        slotElement.addEventListener('click', () => {
                            if (systemState.selectedPackage !== null) {
                                manualPlacePackage(systemState.selectedPackage, shelfId, index);
                            }
                        });
                    }
                    
                    shelfElement.appendChild(slotElement);
                });
            });
        }

        // 更新货架利用率
        function updateShelfUsage() {
            ['A', 'B', 'C'].forEach(shelfId => {
                const shelf = systemState.shelves[shelfId];
                const filledSlots = shelf.filter(slot => slot !== null).length;
                const usage = Math.round((filledSlots / shelf.length) * 100);
                document.getElementById(`shelf${shelfId}Usage`).textContent = `${usage}%`;
            });
        }

        // AI自动规划包裹位置
        function aiAutoPlan() {
            addLog("开始AI自动规划所有包裹...");
            
            // 清空当前货架
            systemState.shelves = {
                A: Array(6).fill(null),
                B: Array(6).fill(null),
                C: Array(6).fill(null)
            };
            
            // 按照规则规划包裹
            systemState.packages.forEach((pkg, index) => {
                aiPlanPackage(index);
            });
            
            renderShelves();
            updateShelfUsage();
            addLog("AI自动规划完成，已为所有包裹推荐最优位置");
        }

        // AI规划单个包裹
        function aiPlanPackage(packageIndex) {
            const pkg = systemState.packages[packageIndex];
            
            // AI规划逻辑
            let targetShelf, targetPosition;
            
            // 规则1: 按尺寸和重量分层
            if (pkg.weight > 3 || pkg.size === "大") {
                // 重货/大件放下层(A区)
                targetShelf = "A";
            } else if (pkg.size === "小" && pkg.weight < 1) {
                // 小件放中层(B区)
                targetShelf = "B";
            } else {
                // 其他放上层(C区)
                targetShelf = "C";
            }
            
            // 规则2: 过度包装的包裹调整到下层(A区)或特定位置
            if (pkg.isOverpack) {
                targetShelf = "A"; // 过度包装放底层
                addLog(`包裹 ${pkg.id} 检测为过度包装，已调整至${targetShelf}区底层`);
            }
            
            // 规则3: 尝试将相同收件人的包裹放在相近位置
            const sameRecipientShelves = findShelvesWithRecipient(pkg.recipient);
            if (sameRecipientShelves.length > 0) {
                // 优先放在已有同收件人包裹的货架
                targetShelf = sameRecipientShelves[0];
            }
            
            // 在目标货架中寻找空位
            targetPosition = findEmptySlot(targetShelf);
            
            // 如果目标货架已满，尝试其他货架
            if (targetPosition === -1) {
                const allShelves = ["A", "B", "C"];
                for (const shelf of allShelves) {
                    if (shelf !== targetShelf) {
                        targetPosition = findEmptySlot(shelf);
                        if (targetPosition !== -1) {
                            targetShelf = shelf;
                            break;
                        }
                    }
                }
            }
            
            // 如果找到空位，放置包裹
            if (targetPosition !== -1) {
                systemState.shelves[targetShelf][targetPosition] = pkg;
                
                // 更新推荐显示
                const recommendationElement = document.getElementById(`recommendation-${packageIndex}`);
                if (recommendationElement) {
                    recommendationElement.textContent = `${targetShelf}区货架 ${targetShelf}${targetPosition + 1}号位`;
                }
                
                return { shelf: targetShelf, position: targetPosition };
            }
            
            return null;
        }

        // 手动规划选中的包裹
        function manualPlanSelected() {
            if (systemState.selectedPackage === null) {
                addLog("请先选择一个包裹");
                return;
            }
            
            const result = aiPlanPackage(systemState.selectedPackage);
            if (result) {
                const pkg = systemState.packages[systemState.selectedPackage];
                addLog(`已为包裹 ${pkg.id} 重新规划位置: ${result.shelf}区${result.shelf}${result.position + 1}号位`);
                renderShelves();
                updateShelfUsage();
            } else {
                addLog("所有货架已满，无法规划新包裹");
            }
        }

        // 手动放置包裹（人工干预）
        function manualPlacePackage(packageIndex, shelfId, position) {
            const pkg = systemState.packages[packageIndex];
            
            // 检查目标位置是否已被占用
            if (systemState.shelves[shelfId][position] !== null) {
                addLog(`${shelfId}区${shelfId}${position + 1}号位已被占用，请选择其他位置`);
                return;
            }
            
            // 放置包裹
            systemState.shelves[shelfId][position] = pkg;
            
            // 更新推荐显示
            const recommendationElement = document.getElementById(`recommendation-${packageIndex}`);
            if (recommendationElement) {
                recommendationElement.textContent = `${shelfId}区货架 ${shelfId}${position + 1}号位 (人工调整)`;
            }
            
            addLog(`人工调整: 包裹 ${pkg.id} 被手动放置到 ${shelfId}区${shelfId}${position + 1}号位`);
            
            // AI重新规划受影响的包裹（简化：只记录日志）
            addLog(`AI将根据人工调整重新规划后续包裹摆放...`);
            
            renderShelves();
            updateShelfUsage();
        }

        // 检测过度包装
        function detectOverpack() {
            addLog("开始检测过度包装...");
            
            let detectedCount = 0;
            systemState.packages.forEach((pkg, index) => {
                // 模拟AI检测逻辑：如果实际尺寸比标注尺寸小两级，则判定为过度包装
                const sizeMap = { "小": 1, "中": 2, "大": 3 };
                if (sizeMap[pkg.actualSize] <= sizeMap[pkg.size] - 2) {
                    if (!pkg.isOverpack) {
                        pkg.isOverpack = true;
                        detectedCount++;
                        
                        // 更新包裹显示
                        const packageElement = document.querySelector(`.package-item[data-index="${index}"]`);
                        if (packageElement) {
                            packageElement.classList.add('overpack');
                            packageElement.innerHTML += '<div class="overpack-badge">过度包装</div>';
                        }
                        
                        addLog(`检测到包裹 ${pkg.id} 为过度包装，外箱:${pkg.size}，内容物:${pkg.actualSize}`);
                    }
                }
            });
            
            if (detectedCount > 0) {
                addLog(`检测完成，发现 ${detectedCount} 个过度包装包裹，已自动标记`);
            } else {
                addLog("检测完成，未发现过度包装包裹");
            }
            
            // 重新渲染包裹列表以显示更新
            renderPackages();
        }

        // 工具函数：在货架中查找空位
        function findEmptySlot(shelfId) {
            const shelf = systemState.shelves[shelfId];
            for (let i = 0; i < shelf.length; i++) {
                if (shelf[i] === null) {
                    return i;
                }
            }
            return -1; // 无空位
        }

        // 工具函数：查找有相同收件人包裹的货架
        function findShelvesWithRecipient(recipient) {
            const shelvesWithRecipient = [];
            
            ['A', 'B', 'C'].forEach(shelfId => {
                const hasRecipient = systemState.shelves[shelfId].some(
                    slot => slot && slot.recipient === recipient
                );
                if (hasRecipient) {
                    shelvesWithRecipient.push(shelfId);
                }
            });
            
            return shelvesWithRecipient;
        }

        // 添加日志
        function addLog(message) {
            const now = new Date();
            const timeString = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
            
            systemState.logs.unshift(`${timeString} ${message}`);
            
            // 只保留最近10条日志
            if (systemState.logs.length > 10) {
                systemState.logs.pop();
            }
            
            renderLogs();
        }

        // 渲染日志
        function renderLogs() {
            const logContainer = document.getElementById('systemLog');
            logContainer.innerHTML = '';
            
            systemState.logs.forEach(log => {
                const logItem = document.createElement('div');
                logItem.className = 'log-item';
                logItem.textContent = log;
                logContainer.appendChild(logItem);
            });
        }

        // 初始化事件监听
        document.addEventListener('DOMContentLoaded', () => {
            // 初始化系统
            initSystem();
            
            // 绑定按钮事件
            document.getElementById('btnAutoPlan').addEventListener('click', aiAutoPlan);
            document.getElementById('btnManualPlan').addEventListener('click', manualPlanSelected);
            document.getElementById('btnDetectOverpack').addEventListener('click', detectOverpack);
            document.getElementById('btnReset').addEventListener('click', initSystem);
            
            addLog("演示系统已就绪，可以开始操作");
        });
    </script>
</body>
</html>
